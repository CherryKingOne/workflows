<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目管理 - 分镜助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --font-family-ui-default: "Noto Sans SC", "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      --bg: #ffffff;
      --bg-rgb: 255 255 255;
      --surface: #f5f5f5;
      --surface-rgb: 245 245 245;
      --border: #e0e0e0;
      --border-rgb: 224 224 224;
      --text: #000000;
      --text-rgb: 0 0 0;
      --text-muted: #666666;
      --text-muted-rgb: 102 102 102;
      --accent: #3B82F6;
      --accent-rgb: 59 130 246;
      --ui-surface-panel: rgba(255, 255, 255, 0.96);
      --ui-surface-field: rgba(248, 250, 252, 0.95);
      --ui-border-soft: rgba(15, 23, 42, 0.12);
      --ui-border-strong: rgba(15, 23, 42, 0.2);
      --ui-shadow-panel: 0 14px 34px rgba(15, 23, 42, 0.18);
      --ui-radius-lg: 12px;
      --ui-radius-xl: 16px;
      --ui-radius-2xl: 20px;
      --node-radius: 12px;
    }

    .dark {
      --bg: #0f0f0f;
      --bg-rgb: 15 15 15;
      --surface: #1a1a1a;
      --surface-rgb: 26 26 26;
      --border: #2a2a2a;
      --border-rgb: 42 42 42;
      --text: #ffffff;
      --text-rgb: 255 255 255;
      --text-muted: #888888;
      --text-muted-rgb: 136 136 136;
      --ui-surface-panel: rgb(26, 26, 26);
      --ui-surface-field: rgba(10, 10, 12, 0.92);
      --ui-border-soft: rgba(255, 255, 255, 0.14);
      --ui-border-strong: rgba(255, 255, 255, 0.24);
      --ui-shadow-panel: 0 14px 34px rgba(0, 0, 0, 0.38);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-family-ui-default);
      background-color: var(--bg);
      color: var(--text);
    }

    .traffic-lights {
      display: flex;
      gap: 8px;
      padding: 0 12px;
    }

    .traffic-light {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .traffic-light.close {
      background: linear-gradient(0deg, #FF5F57 0%, #FF5F57 100%);
      border: 0.5px solid #E0443E;
    }

    .traffic-light.minimize {
      background: linear-gradient(0deg, #FEBC2E 0%, #FEBC2E 100%);
      border: 0.5px solid #DEA123;
    }

    .traffic-light.maximize {
      background: linear-gradient(0deg, #28C840 0%, #28C840 100%);
      border: 0.5px solid #1AAB29;
    }

    .traffic-light:hover {
      opacity: 0.8;
    }

    .ui-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.56) transparent;
    }

    .ui-scrollbar::-webkit-scrollbar {
      width: 7px;
      height: 7px;
    }

    .ui-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .ui-scrollbar::-webkit-scrollbar-thumb {
      border-radius: 9999px;
      background: rgba(148, 163, 184, 0.5);
    }

    .ui-scrollbar:hover::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.72);
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
      transition: background-color 0.15s;
    }

    .btn-primary:hover {
      background-color: rgba(59, 130, 246, 0.85);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      transition: background-color 0.15s;
    }

    .btn-ghost:hover {
      background: rgba(var(--bg-rgb), 0.7);
    }

    .project-card {
      transition: all 0.2s ease;
    }

    .project-card:hover {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }

    .project-card .card-actions {
      opacity: 0;
      transition: opacity 0.15s;
    }

    .project-card:hover .card-actions {
      opacity: 1;
    }

    .project-card.is-link {
      position: relative;
    }

    .project-card.is-link:focus-visible {
      outline: 2px solid rgba(var(--accent-rgb), 0.9);
      outline-offset: 2px;
    }

    .hint-card {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .theme-icon {
      transition: transform 0.2s;
    }

    .theme-icon:hover {
      transform: rotate(15deg);
    }
  </style>
</head>
<body class="bg-[var(--bg)]">
  <div class="h-full w-full flex flex-col">
    <!-- 主内容区 -->
    <main class="flex-1 overflow-auto ui-scrollbar p-8">
      <!-- 头部区域 -->
      <div class="max-w-6xl mx-auto">
        <div class="flex items-center justify-between mb-6">
          <h1 class="text-2xl font-semibold" style="color: var(--text);">项目</h1>
          <div class="flex items-center gap-3">
            <!-- 排序控件 -->
            <select class="h-9 rounded-lg text-sm px-3 border border-[var(--border)] bg-[var(--surface)] focus:outline-none focus:border-[var(--accent)]" style="color: var(--text);">
              <option>按修改时间</option>
              <option>按创建时间</option>
              <option>按名称</option>
            </select>
            <!-- 新建项目按钮 -->
            <button class="btn-primary h-9 px-4 rounded-lg text-sm font-medium flex items-center gap-2" type="button" onclick="goToCanvas()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/>
                <path d="M12 5v14"/>
              </svg>
              新建项目
            </button>
          </div>
        </div>

        <!-- 提示区域 - 缺失 API Key -->
        <div class="hint-card rounded-xl p-4 mb-6 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-[var(--accent)]/20 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15.5 7.5 19 4"/>
                <path d="m12.5 10.5 2-2"/>
                <path d="m9.5 13.5 2-2"/>
                <path d="m6.5 16.5 2-2"/>
                <path d="M2 22 6.5 17.5"/>
                <path d="M12 17.5 17.5 12"/>
                <path d="M22 2 17.5 6.5"/>
              </svg>
            </div>
            <div>
              <p class="text-sm font-medium" style="color: var(--text);">需要配置 API Key</p>
              <p class="text-xs mt-0.5" style="color: var(--text-muted);">请前往设置页面配置供应商 API Key 以使用 AI 功能</p>
            </div>
          </div>
          <button class="btn-primary h-8 px-3 rounded-lg text-xs font-medium" type="button">
            前往设置
          </button>
        </div>

        <!-- 项目卡片网格 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- 项目卡片 1 -->
          <div class="project-card is-link bg-[var(--surface)] border border-[var(--border)] rounded-lg p-4 cursor-pointer" data-href="./canvas.html" tabindex="0" role="link" aria-label="打开项目 我的第一个项目">
            <div class="flex items-start justify-between">
              <h3 class="font-semibold text-sm truncate flex-1" style="color: var(--text);">我的第一个项目</h3>
              <div class="card-actions flex items-center gap-1 ml-2">
                <button class="btn-ghost p-1.5 rounded-md" type="button" aria-label="编辑">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                    <path d="m15 5 4 4"/>
                  </svg>
                </button>
                <button class="btn-ghost p-1.5 rounded-md text-red-500 hover:bg-red-500/10" type="button" aria-label="删除">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="mt-3">
              <p class="text-xs" style="color: var(--text-muted);">修改于 2 小时前</p>
              <p class="text-xs mt-1" style="color: var(--text-muted);">创建于 2024-03-28</p>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full bg-[var(--accent)]/10 text-[var(--accent)]">5 个节点</span>
            </div>
          </div>

          <!-- 项目卡片 2 -->
          <div class="project-card is-link bg-[var(--surface)] border border-[var(--border)] rounded-lg p-4 cursor-pointer" data-href="./canvas.html" tabindex="0" role="link" aria-label="打开项目 产品宣传分镜">
            <div class="flex items-start justify-between">
              <h3 class="font-semibold text-sm truncate flex-1" style="color: var(--text);">产品宣传分镜</h3>
              <div class="card-actions flex items-center gap-1 ml-2">
                <button class="btn-ghost p-1.5 rounded-md" type="button" aria-label="编辑">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                    <path d="m15 5 4 4"/>
                  </svg>
                </button>
                <button class="btn-ghost p-1.5 rounded-md text-red-500 hover:bg-red-500/10" type="button" aria-label="删除">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="mt-3">
              <p class="text-xs" style="color: var(--text-muted);">修改于 1 天前</p>
              <p class="text-xs mt-1" style="color: var(--text-muted);">创建于 2024-03-25</p>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full bg-[var(--accent)]/10 text-[var(--accent)]">12 个节点</span>
            </div>
          </div>

          <!-- 项目卡片 3 -->
          <div class="project-card is-link bg-[var(--surface)] border border-[var(--border)] rounded-lg p-4 cursor-pointer" data-href="./canvas.html" tabindex="0" role="link" aria-label="打开项目 动画短片设计">
            <div class="flex items-start justify-between">
              <h3 class="font-semibold text-sm truncate flex-1" style="color: var(--text);">动画短片设计</h3>
              <div class="card-actions flex items-center gap-1 ml-2">
                <button class="btn-ghost p-1.5 rounded-md" type="button" aria-label="编辑">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                    <path d="m15 5 4 4"/>
                  </svg>
                </button>
                <button class="btn-ghost p-1.5 rounded-md text-red-500 hover:bg-red-500/10" type="button" aria-label="删除">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="mt-3">
              <p class="text-xs" style="color: var(--text-muted);">修改于 3 天前</p>
              <p class="text-xs mt-1" style="color: var(--text-muted);">创建于 2024-03-20</p>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full bg-[var(--accent)]/10 text-[var(--accent)]">8 个节点</span>
            </div>
          </div>

          <!-- 项目卡片 4 -->
          <div class="project-card is-link bg-[var(--surface)] border border-[var(--border)] rounded-lg p-4 cursor-pointer" data-href="./canvas.html" tabindex="0" role="link" aria-label="打开项目 UI 设计稿">
            <div class="flex items-start justify-between">
              <h3 class="font-semibold text-sm truncate flex-1" style="color: var(--text);">UI 设计稿</h3>
              <div class="card-actions flex items-center gap-1 ml-2">
                <button class="btn-ghost p-1.5 rounded-md" type="button" aria-label="编辑">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                    <path d="m15 5 4 4"/>
                  </svg>
                </button>
                <button class="btn-ghost p-1.5 rounded-md text-red-500 hover:bg-red-500/10" type="button" aria-label="删除">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="mt-3">
              <p class="text-xs" style="color: var(--text-muted);">修改于 1 周前</p>
              <p class="text-xs mt-1" style="color: var(--text-muted);">创建于 2024-03-15</p>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full bg-[var(--accent)]/10 text-[var(--accent)]">3 个节点</span>
            </div>
          </div>

          <!-- 项目卡片 5 -->
          <div class="project-card is-link bg-[var(--surface)] border border-[var(--border)] rounded-lg p-4 cursor-pointer" data-href="./canvas.html" tabindex="0" role="link" aria-label="打开项目 品牌故事板">
            <div class="flex items-start justify-between">
              <h3 class="font-semibold text-sm truncate flex-1" style="color: var(--text);">品牌故事板</h3>
              <div class="card-actions flex items-center gap-1 ml-2">
                <button class="btn-ghost p-1.5 rounded-md" type="button" aria-label="编辑">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                    <path d="m15 5 4 4"/>
                  </svg>
                </button>
                <button class="btn-ghost p-1.5 rounded-md text-red-500 hover:bg-red-500/10" type="button" aria-label="删除">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="mt-3">
              <p class="text-xs" style="color: var(--text-muted);">修改于 2 周前</p>
              <p class="text-xs mt-1" style="color: var(--text-muted);">创建于 2024-03-01</p>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full bg-[var(--accent)]/10 text-[var(--accent)]">15 个节点</span>
            </div>
          </div>

          <!-- 新建项目卡片 -->
          <div class="project-card is-link bg-[var(--surface)] border border-dashed border-[var(--border)] rounded-lg p-4 cursor-pointer flex flex-col items-center justify-center min-h-[140px] hover:border-[var(--accent)] hover:bg-[var(--accent)]/5" data-href="./canvas.html" tabindex="0" role="link" aria-label="新建项目并进入画布">
            <div class="w-10 h-10 rounded-full bg-[var(--accent)]/10 flex items-center justify-center mb-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/>
                <path d="M12 5v14"/>
              </svg>
            </div>
            <span class="text-sm font-medium" style="color: var(--text-muted);">新建项目</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function goToCanvas() {
      window.location.href = './canvas.html';
    }

    function bindProjectLinks() {
      const projectCards = document.querySelectorAll('.project-card[data-href]');

      for (const card of projectCards) {
        const navigate = () => {
          const nextPage = card.getAttribute('data-href');
          if (nextPage) {
            window.location.href = nextPage;
          }
        };

        card.addEventListener('click', (event) => {
          if (event.target.closest('button')) {
            return;
          }
          navigate();
        });

        card.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            navigate();
          }
        });
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const sunIcon = document.getElementById('theme-icon-sun');
      const moonIcon = document.getElementById('theme-icon-moon');

      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      } else {
        html.classList.add('dark');
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }
    }

    bindProjectLinks();
  </script>
</body>
</html>
