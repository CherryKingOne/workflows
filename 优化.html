<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传卡片 - 完整复刻交互版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 背景点状网格复刻 */
        .bg-dot-grid {
            background-color: #0b0c0e;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        /* 自定义深色卡片背景 */
        .bg-card-dark { background-color: #18191c; }
        .bg-btn-dark { background-color: #1e2023; }
        .bg-tool-dark { background-color: #2a2d32; }

        /* 连接线样式 */
        .connection-line {
            stroke: #a3a3a3; /* 灰白色 - 连接后状态 */
            stroke-width: 2;
            fill: none;
            transition: stroke 0.2s ease, stroke-width 0.2s ease;
        }
        .connection-line.dragging {
            stroke: #737373; /* 深灰色 - 拖拽中状态 */
            stroke-width: 2;
            stroke-dasharray: 6 4; /* 虚线效果表示拖拽中 */
            animation: dash-flow 0.5s linear infinite;
        }
        .connection-line:hover {
            stroke: #d4d4d4; /* 悬停时更亮 */
            stroke-width: 2.5;
            cursor: pointer;
        }
        @keyframes dash-flow {
            to {
                stroke-dashoffset: -10;
            }
        }
    </style>
</head>
<body class="bg-dot-grid text-neutral-300 min-h-screen p-8 md:p-16 font-sans antialiased overflow-x-hidden">

    <div class="max-w-7xl mx-auto space-y-24">
        
        <!-- ================= 第一部分：组件状态演进 ================= -->
        <section>
            <h2 class="text-white text-xl font-medium mb-10 border-l-4 border-neutral-700 pl-4">组件状态演进</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                
                <!-- 状态 1: 默认态 -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 01: Default</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">文件上传</div>
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center border border-transparent relative">
                            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer hover:bg-neutral-400 transition-colors"></div>
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer hover:bg-neutral-400 transition-colors"></div>
                            <button class="border border-neutral-700 bg-btn-dark hover:border-neutral-500 text-neutral-200 text-sm px-5 py-2 rounded-xl transition-all">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴<br>支持图片、视频、音频素材</div>
                        </div>
                    </div>
                </div>

                <!-- 状态 2: 交互态 (带弧形菜单) -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 02: Tool Interaction</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">文件上传</div>
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center relative border border-neutral-700">
                            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer hover:bg-neutral-400 transition-colors"></div>
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer hover:bg-neutral-400 transition-colors"></div>
                            <button class="absolute -top-2.5 -right-2.5 w-7 h-7 bg-tool-dark border border-neutral-700 rounded-full flex items-center justify-center text-neutral-400 hover:text-white"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                            <button class="border border-neutral-700 bg-btn-dark text-neutral-200 text-sm px-5 py-2 rounded-xl">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴</div>
                        </div>
                    </div>
                </div>

                <!-- 状态 3: 激活/聚焦态 -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 03: Focused / Selected</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">文件上传</div>
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center border-2 border-neutral-500 shadow-[0_0_20px_rgba(255,255,255,0.05)] relative">
                            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-400 rounded-full border-2 border-white cursor-pointer hover:bg-white transition-colors"></div>
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-400 rounded-full border-2 border-white cursor-pointer hover:bg-white transition-colors"></div>
                            <button class="border border-neutral-700 bg-btn-dark text-neutral-200 text-sm px-5 py-2 rounded-xl">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴</div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- ================= 新增状态 4: 文件已上传 & 悬浮工具栏 ================= -->
            <div class="mt-16">
                <p class="text-xs text-neutral-500 uppercase tracking-tighter mb-10">Status 04: Uploaded Content & Top Toolbar</p>
                <div class="relative flex justify-center mt-12 w-full max-w-[420px] mx-auto">
                    
                    <!-- 顶部悬浮工具栏 (完美复刻截图样式) -->
                    <div class="absolute -top-16 z-20 flex items-center bg-[#0a0a0c] rounded-full border border-[#2a2a2c] px-3 py-1.5 shadow-xl space-x-1">
                        <!-- 相机 (高亮态) -->
                        <div class="flex items-center justify-center w-[34px] h-[34px] bg-[#222327] rounded-lg border border-neutral-700 cursor-pointer">
                            <i data-lucide="camera" class="w-[18px] h-[18px] text-white"></i>
                        </div>
                        
                        <div class="w-[1px] h-5 bg-[#1f1f23] mx-1"></div>
                        
                        <!-- 其他线条工具 -->
                        <div class="flex items-center justify-center w-[34px] h-[34px] rounded-lg hover:bg-neutral-800/50 cursor-pointer transition-colors group">
                            <i data-lucide="pen-tool" class="w-[18px] h-[18px] text-[#a1a1aa] group-hover:text-white"></i>
                        </div>
                        <div class="w-[1px] h-5 bg-[#1f1f23] mx-1"></div>
                        
                        <div class="flex items-center justify-center w-[34px] h-[34px] rounded-lg hover:bg-neutral-800/50 cursor-pointer transition-colors group">
                            <i data-lucide="map-pin" class="w-[18px] h-[18px] text-[#a1a1aa] group-hover:text-white"></i>
                        </div>
                        <div class="w-[1px] h-5 bg-[#1f1f23] mx-1"></div>
                        
                        <div class="flex items-center justify-center w-[34px] h-[34px] rounded-lg hover:bg-neutral-800/50 cursor-pointer transition-colors group">
                            <i data-lucide="scissors" class="w-[18px] h-[18px] text-[#a1a1aa] group-hover:text-white"></i>
                        </div>
                        <div class="w-[1px] h-5 bg-[#1f1f23] mx-1"></div>
                        
                        <div class="flex items-center justify-center w-[34px] h-[34px] rounded-lg hover:bg-neutral-800/50 cursor-pointer transition-colors group">
                            <i data-lucide="eraser" class="w-[18px] h-[18px] text-[#a1a1aa] group-hover:text-white"></i>
                        </div>
                        <div class="w-[1px] h-5 bg-[#1f1f23] mx-1"></div>
                        
                        <div class="flex items-center justify-center w-[34px] h-[34px] rounded-lg hover:bg-neutral-800/50 cursor-pointer transition-colors group">
                            <i data-lucide="lightbulb" class="w-[18px] h-[18px] text-[#a1a1aa] group-hover:text-white"></i>
                        </div>
                        <div class="w-[1px] h-5 bg-[#1f1f23] mx-1"></div>
                        
                        <div class="flex items-center justify-center w-[34px] h-[34px] rounded-lg hover:bg-neutral-800/50 cursor-pointer transition-colors group">
                            <i data-lucide="sliders-horizontal" class="w-[18px] h-[18px] text-[#a1a1aa] group-hover:text-white"></i>
                        </div>
                        <div class="w-[1px] h-5 bg-[#1f1f23] mx-1"></div>
                        
                        <div class="flex items-center justify-center w-[34px] h-[34px] rounded-lg hover:bg-neutral-800/50 cursor-pointer transition-colors group">
                            <i data-lucide="pen-line" class="w-[18px] h-[18px] text-[#a1a1aa] group-hover:text-white"></i>
                        </div>
                        <div class="w-[1px] h-5 bg-[#1f1f23] mx-1"></div>
                        
                        <div class="flex items-center justify-center w-[34px] h-[34px] rounded-lg hover:bg-neutral-800/50 cursor-pointer transition-colors group">
                            <i data-lucide="image-plus" class="w-[18px] h-[18px] text-[#a1a1aa] group-hover:text-white"></i>
                        </div>
                    </div>

                    <!-- 图片卡片本体 -->
                    <div class="relative w-full">
                        <div class="text-[11px] text-neutral-500 mb-2 pl-2">文件上传</div>
                        
                        <!-- 这里的 border-2 border-white 表现选中态 -->
                        <div class="w-full aspect-square bg-card-dark rounded-[1rem] border-2 border-white shadow-[0_0_24px_rgba(255,255,255,0.08)] relative box-border flex flex-col p-1">
                            
                            <!-- 内部图片裁剪包裹层，预留外边框空间 -->
                            <div class="w-full h-full rounded-[0.8rem] overflow-hidden bg-neutral-900 relative">
                                <!-- 模拟占位图片 -->
                                <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="Uploaded Content" class="w-full h-full object-cover">
                            </div>

                            <!-- 侧边连接点 -->
                            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3.5 h-3.5 bg-white rounded-full border border-neutral-300 cursor-pointer hover:scale-125 transition-transform shadow-sm"></div>
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3.5 h-3.5 bg-white rounded-full border border-neutral-300 cursor-pointer hover:scale-125 transition-transform shadow-sm"></div>
                        </div>
                    </div>
                </div>
            </div>

        </section>

        <!-- ================= 第二部分：连接线样式演示 (保持不变) ================= -->
        <section>
            <h2 class="text-white text-xl font-medium mb-10 border-l-4 border-neutral-700 pl-4">连接线演示</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <!-- 拖拽中状态 -->
                <div class="bg-[#121316] rounded-2xl border border-neutral-800 p-8 min-h-[200px] flex flex-col items-center justify-center relative">
                    <div class="relative w-full max-w-[320px] h-12 z-10 flex items-center justify-between">
                        <svg class="absolute inset-0 w-full h-full pointer-events-none z-[-1]" style="overflow: visible;">
                            <path class="connection-line dragging" d="M 48,24 C 100,24 220,24 272,24" />
                        </svg>
                        <div class="w-12 h-12 bg-tool-dark rounded-xl border border-neutral-700 flex items-center justify-center relative z-10">
                            <i data-lucide="upload" class="w-5 h-5 text-neutral-400"></i>
                        </div>
                        <div class="w-12 h-12 bg-tool-dark rounded-xl border border-neutral-700 flex items-center justify-center border-dashed relative z-10">
                            <i data-lucide="download" class="w-5 h-5 text-neutral-500"></i>
                        </div>
                    </div>
                </div>

                <!-- 连接后状态 -->
                <div class="bg-[#121316] rounded-2xl border border-neutral-800 p-8 min-h-[200px] flex flex-col items-center justify-center relative">
                    <div class="relative w-full max-w-[320px] h-12 z-10 flex items-center justify-between">
                        <svg class="absolute inset-0 w-full h-full pointer-events-none z-[-1]" style="overflow: visible;">
                            <path class="connection-line" d="M 48,24 C 100,24 220,24 272,24" />
                        </svg>
                        <div class="w-12 h-12 bg-tool-dark rounded-xl border border-neutral-500 flex items-center justify-center relative z-10">
                            <i data-lucide="upload" class="w-5 h-5 text-neutral-300"></i>
                        </div>
                        <div class="w-12 h-12 bg-tool-dark rounded-xl border border-neutral-500 flex items-center justify-center relative z-10">
                            <i data-lucide="download" class="w-5 h-5 text-neutral-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
