<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Editor UI Clone · 精简连接点</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义深色点阵背景 */
        body {
            background-color: #121212;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 24px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 antialiased text-gray-200">

    <!-- 顶部工具栏 -->
    <div class="flex items-center bg-[#252525] border border-[#3e3e3e] rounded-full px-4 py-1.5 shadow-lg mb-8 text-xs font-medium text-[#999]">
        <!-- 基础节点图标 -->
        <button class="flex items-center justify-center p-1 hover:text-white transition-colors mr-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        </button>
        
        <div class="w-px h-4 bg-[#3e3e3e] mx-2"></div> <!-- 分割线 -->

        <button class="flex items-center gap-1.5 px-3 py-1 hover:text-white transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
            保存到素材
        </button>

        <button class="flex items-center gap-1.5 px-3 py-1 hover:text-white transition-colors">
            批量下载
        </button>

        <button class="flex items-center gap-1.5 px-3 py-1 hover:text-white transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            创建副本
        </button>

        <button class="flex items-center gap-1.5 px-3 py-1 hover:text-white transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
            打组
        </button>
    </div>

    <!-- 主工作区虚线框 -->
    <div class="relative border border-dashed border-[#555] rounded-lg p-6 w-[700px] flex flex-col gap-6">

        <!-- ===== 图片节点 2 ===== -->
        <div class="flex flex-col gap-2 relative">
            <!-- 节点标题 -->
            <div class="flex items-center gap-2 text-[#888] text-xs font-medium px-1">
                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>
                图片节点 2
            </div>

            <!-- 节点主面板 -->
            <div class="relative bg-[#2e2e2e] border border-[#4a4a4a] rounded-xl h-[340px] w-full overflow-hidden shadow-sm group">
                <!-- 中心占位大图标 -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <svg class="w-20 h-20 text-[#444]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>
                </div>

                <!-- 左下角操作区 -->
                <div class="absolute bottom-6 left-6 flex flex-col gap-3">
                    <span class="text-[#888] text-xs">尝试：</span>
                    
                    <button class="flex items-center gap-2 text-[#ccc] hover:text-white text-sm transition-colors group/btn">
                        <svg class="w-4 h-4 text-[#888] group-hover/btn:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        图生图
                    </button>

                    <button class="flex items-center gap-2 text-[#ccc] hover:text-white text-sm transition-colors group/btn">
                        <!-- 自定义 HD 图标 -->
                        <div class="w-4 h-4 bg-transparent border border-[#3b82f6] rounded-[4px] flex items-center justify-center text-[#3b82f6] group-hover/btn:bg-[#3b82f6] group-hover/btn:text-white transition-colors text-[8px] font-bold">
                            HD
                        </div>
                        图片高清
                    </button>
                </div>
            </div>
        </div>


        <!-- ===== 图片节点 3 ===== -->
        <div class="flex flex-col gap-2 relative mt-2">
            <!-- 节点标题 -->
            <div class="flex items-center gap-2 text-[#888] text-xs font-medium px-1">
                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>
                图片节点 3
            </div>

            <!-- 节点主面板 -->
            <div class="relative bg-[#2e2e2e] border border-[#4a4a4a] rounded-xl h-[340px] w-full overflow-hidden shadow-sm group">
                <!-- 中心占位大图标 -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <svg class="w-20 h-20 text-[#444]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>
                </div>

                <!-- 左下角操作区 -->
                <div class="absolute bottom-6 left-6 flex flex-col gap-3">
                    <span class="text-[#888] text-xs">尝试：</span>
                    
                    <button class="flex items-center gap-2 text-[#ccc] hover:text-white text-sm transition-colors group/btn">
                        <svg class="w-4 h-4 text-[#888] group-hover/btn:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        图生图
                    </button>

                    <button class="flex items-center gap-2 text-[#ccc] hover:text-white text-sm transition-colors group/btn">
                        <!-- 自定义 HD 图标 -->
                        <div class="w-4 h-4 bg-transparent border border-[#3b82f6] rounded-[4px] flex items-center justify-center text-[#3b82f6] group-hover/btn:bg-[#3b82f6] group-hover/btn:text-white transition-colors text-[8px] font-bold">
                            HD
                        </div>
                        图片高清
                    </button>
                </div>
            </div>

            <!-- 左侧连接点已移除 · 右侧连接点已移除 · 保持节点干净 -->
        </div>

        <!-- 组级别左侧大加号 (放置在两节点中间偏左) —— 作为组操作入口 -->
        <div class="absolute top-1/2 -left-[12px] -translate-y-1/2 w-6 h-6 bg-[#252525] border border-[#555] rounded-full flex items-center justify-center cursor-pointer hover:bg-[#333] hover:border-white text-[#888] hover:text-white transition-colors z-20 shadow-md">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </div>

        <!-- 组级别右侧大加号 (放置在两节点中间偏右) —— 作为组操作入口 -->
        <div class="absolute top-1/2 -right-[12px] -translate-y-1/2 w-6 h-6 bg-[#252525] border border-[#555] rounded-full flex items-center justify-center cursor-pointer hover:bg-[#333] hover:border-white text-[#888] hover:text-white transition-colors z-20 shadow-md">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </div>

    </div>

</body>
</html>
