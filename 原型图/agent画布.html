<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>深色画布设计</title>
</head>
<body class="bg-[#1a1a1a] min-h-screen flex items-center justify-center p-6">

    <!-- 画布容器 -->
    <div class="relative w-full max-w-5xl aspect-video md:aspect-[16/9] bg-[#292929] 
                border-2 border-dashed border-white/60 rounded-[2rem] 
                shadow-2xl flex flex-col items-center justify-center overflow-hidden
                transition-all duration-300 hover:border-white/90">
        
        <!-- 边角指示器 (增加设计感) -->
        <div class="absolute top-6 left-6 w-3 h-3 border-t-2 border-l-2 border-white/40"></div>
        <div class="absolute top-6 right-6 w-3 h-3 border-t-2 border-r-2 border-white/40"></div>
        <div class="absolute bottom-6 left-6 w-3 h-3 border-b-2 border-l-2 border-white/40"></div>
        <div class="absolute bottom-6 right-6 w-3 h-3 border-b-2 border-r-2 border-white/40"></div>

    </div>

</body>
</html>
