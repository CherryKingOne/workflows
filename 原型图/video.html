<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance UI Replica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0c0c0c; color: #e5e5e5; }
        .dot-grid {
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .glass-panel {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="dot-grid min-h-screen flex flex-col items-center justify-center p-4 select-none">

    <div x-data="{ 
        activeState: 1, 
        popover: null, 
        model: 'Seedance 2.0 VIP',
        ratio: '16:9',
        resolution: '720P',
        duration: '5s'
    }" class="relative w-full max-w-4xl space-y-6">

        <!-- 顶部工具栏 (图1/3/4/5/6) -->
        <div class="flex justify-center mb-4" x-show="activeState !== 2">
            <button class="bg-[#2a2a2a] hover:bg-[#333] px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-white/10">
                <i class="fa-solid fa-upload"></i> 上传
            </button>
        </div>

        <!-- 1. 视频卡片区域 (图1 & 图2) -->
        <div class="relative flex items-center justify-center gap-4">
            <!-- 左侧侧边按钮 (图1) -->
            <button x-show="activeState !== 2" class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center text-white/40 hover:text-white hover:border-white">
                <i class="fa-solid fa-plus text-xs"></i>
            </button>

            <!-- 主视频卡片 -->
            <div :class="activeState === 2 ? 'w-[600px] opacity-60' : 'w-full'" 
                 class="bg-[#1a1a1a] border border-white/10 rounded-[24px] p-8 aspect-video flex flex-col transition-all duration-300">
                <div class="flex items-center gap-2 text-white/40 text-xs mb-8">
                    <i class="fa-solid fa-circle-play"></i> 视频节点 2
                </div>
                
                <div class="flex-1 flex flex-col justify-center items-center">
                    <!-- 播放按钮 -->
                    <div class="w-16 h-16 bg-white/10 rounded-xl flex items-center justify-center mb-10 hover:bg-white/20 cursor-pointer">
                        <i class="fa-solid fa-play text-2xl text-white/60"></i>
                    </div>

                    <!-- 引导文字 -->
                    <div class="w-full max-w-xs space-y-4 text-sm">
                        <div class="text-white/40">尝试：</div>
                        <div class="flex items-center gap-3 hover:text-white cursor-pointer group">
                            <i class="fa-solid fa-layer-group text-white/60 group-hover:text-white"></i>
                            <span>首尾帧生成视频</span>
                        </div>
                        <div class="flex items-center gap-3 hover:text-white cursor-pointer group">
                            <i class="fa-solid fa-wand-magic-sparkles text-white/60 group-hover:text-white"></i>
                            <span>首帧生成视频</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧侧边按钮 (图1) -->
            <button x-show="activeState !== 2" class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center text-white/40 hover:text-white hover:border-white">
                <i class="fa-solid fa-plus text-xs"></i>
            </button>
        </div>

        <!-- 2. 底部输入面板 (图1核心) -->
        <div x-show="activeState !== 2" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4"
             class="bg-[#1a1a1a] border border-white/10 rounded-2xl p-4 w-full relative">
            
            <!-- 顶部标签栏 -->
            <div class="flex items-center gap-2 mb-4">
                <div class="flex bg-[#0c0c0c] p-1 rounded-lg">
                    <button class="bg-[#2a2a2a] text-white px-3 py-1.5 rounded-md text-xs">文生视频</button>
                    <button class="text-white/40 px-3 py-1.5 rounded-md text-xs hover:text-white">全能参考</button>
                    <button class="text-white/40 px-3 py-1.5 rounded-md text-xs hover:text-white">图生视频</button>
                    <button class="text-white/40 px-3 py-1.5 rounded-md text-xs hover:text-white">首尾帧</button>
                    <button class="text-white/40 px-3 py-1.5 rounded-md text-xs hover:text-white">图片参考</button>
                </div>
                <div class="flex-1"></div>
                <i class="fa-solid fa-expand text-white/40 text-xs cursor-pointer"></i>
            </div>

            <!-- 辅助按钮 -->
            <div class="flex gap-2 mb-4">
                <button class="flex flex-col items-center justify-center w-12 h-12 bg-[#0c0c0c] border border-white/5 rounded-lg text-[10px] text-white/40 hover:border-white/20">
                    <i class="fa-solid fa-location-dot mb-1"></i> 标记
                </button>
                <button class="flex flex-col items-center justify-center w-12 h-12 bg-[#0c0c0c] border border-white/5 rounded-lg text-[10px] text-white/40 hover:border-white/20">
                    <i class="fa-solid fa-camera mb-1"></i> 运镜
                </button>
                <button class="flex flex-col items-center justify-center w-12 h-12 bg-[#0c0c0c] border border-white/5 rounded-lg text-[10px] text-white/40 hover:border-white/20">
                    <i class="fa-solid fa-user-shield mb-1"></i> 角色库
                </button>
            </div>

            <!-- 输入框 -->
            <div class="mb-4">
                <textarea class="w-full bg-transparent border-none focus:ring-0 text-sm text-white/80 placeholder-white/20 h-20 resize-none" placeholder="描述你想要生成的画面内容，@引用素材"></textarea>
            </div>

            <!-- 底部状态栏 -->
            <div class="flex items-center justify-between pt-2 border-t border-white/5 relative">
                <div class="flex items-center gap-3">
                    <!-- 模型选择按钮 (触发图4) -->
                    <button @click="popover = (popover === 'model' ? null : 'model')" class="flex items-center gap-2 text-xs text-white/60 hover:text-white transition-colors">
                        <i class="fa-solid fa-chart-simple text-white"></i>
                        <span x-text="model"></span>
                        <span class="bg-[#f3a73c] text-black text-[10px] px-1 rounded font-bold">VIP</span>
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>

                    <!-- 参数设置按钮 (触发图3) -->
                    <button @click="popover = (popover === 'setting' ? null : 'setting')" class="flex items-center gap-2 text-xs text-white/60 bg-[#252525] px-2 py-1 rounded hover:text-white">
                        <i class="fa-solid fa-rectangle-list"></i>
                        <span x-text="`${ratio} · ${resolution} · ${duration}`"></span>
                        <i class="fa-solid fa-volume-high"></i>
                        <i class="fa-solid fa-chevron-up text-[10px]"></i>
                    </button>
                </div>

                <div class="flex items-center gap-4">
                    <i class="fa-solid fa-language text-white/40 hover:text-white cursor-pointer"></i>
                    <!-- 高级设置按钮 (触发图5) -->
                    <i @click="popover = (popover === 'advanced' ? null : 'advanced')" class="fa-solid fa-sliders text-white/40 hover:text-white cursor-pointer" :class="popover==='advanced' && 'bg-white/10 p-1 rounded'"></i>
                    
                    <!-- 数量选择 (触发图6) -->
                    <button @click="popover = (popover === 'count' ? null : 'count')" class="text-xs text-white/60 flex items-center gap-1 hover:text-white">
                        1个 <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>

                    <div class="text-xs text-white/40">
                        <i class="fa-solid fa-bolt text-white/60"></i> 108 / 135
                    </div>
                    
                    <button class="bg-white/20 w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white/40">
                        <i class="fa-solid fa-arrow-up text-white"></i>
                    </button>
                </div>

                <!-- --- 各类弹窗容器 (Popovers) --- -->

                <!-- 图3: 参数设置弹窗 -->
                <div x-show="popover === 'setting'" x-cloak class="absolute bottom-12 left-28 w-80 glass-panel rounded-xl p-4 z-50 shadow-2xl">
                    <div class="text-xs text-white/40 mb-3">比例</div>
                    <div class="grid grid-cols-5 gap-2 mb-4">
                        <template x-for="r in ['Auto', '16:9', '4:3', '1:1', '3:4', '9:16', '21:9']">
                            <div @click="ratio = r" :class="ratio === r ? 'border-white bg-white/10' : 'border-white/10'" class="aspect-square border rounded flex flex-col items-center justify-center cursor-pointer hover:border-white/40 transition-all">
                                <div class="w-4 h-3 border border-white/40 mb-1"></div>
                                <span class="text-[10px]" x-text="r"></span>
                            </div>
                        </template>
                    </div>
                    <div class="text-xs text-white/40 mb-3">清晰度</div>
                    <div class="flex gap-2 mb-4">
                        <button @click="resolution = '480P'" :class="resolution === '480P' ? 'bg-white/10 border-white/40' : 'bg-transparent border-white/10'" class="flex-1 border py-2 rounded text-xs">480P</button>
                        <button @click="resolution = '720P'" :class="resolution === '720P' ? 'bg-white/10 border-white/40' : 'bg-transparent border-white/10'" class="flex-1 border py-2 rounded text-xs">720P</button>
                    </div>
                    <div class="flex justify-between text-xs text-white/40 mb-2">
                        <span>视频时长</span>
                        <span class="text-white" x-text="duration"></span>
                    </div>
                    <input type="range" class="w-full accent-white h-1 mb-4" min="5" max="15" step="5" @input="duration = $event.target.value + 's'">
                    <div class="text-xs text-white/40 mb-2">生成音频 <i class="fa-regular fa-circle-question"></i></div>
                    <div class="flex gap-2">
                        <button class="flex-1 bg-white/5 border border-white/10 py-2 rounded text-xs hover:bg-white/10">开启</button>
                        <button class="flex-1 bg-white/5 border border-white/10 py-2 rounded text-xs hover:bg-white/10">关闭</button>
                    </div>
                </div>

                <!-- 图4: 模型列表弹窗 -->
                <div x-show="popover === 'model'" x-cloak class="absolute bottom-12 left-0 w-72 glass-panel rounded-xl overflow-hidden z-50 shadow-2xl">
                    <div class="max-h-80 overflow-y-auto">
                        <template x-for="m in [
                            {name: 'Seedance 2.0 VIP', time: '2min', vip: true, desc: '最强视频模型，会员专属通道'},
                            {name: 'Kling O3', time: '3min', vip: true},
                            {name: 'Wan 2.7', time: '3min', vip: false},
                            {name: 'Kling O1', time: '3min', vip: true, badge: '积分5折'}
                        ]">
                            <div @click="model = m.name; popover = null" class="p-3 hover:bg-white/5 cursor-pointer border-b border-white/5 transition-colors">
                                <div class="flex items-center justify-between mb-1">
                                    <div class="flex items-center gap-2">
                                        <i class="fa-solid fa-chart-simple text-sm text-white/60"></i>
                                        <span class="text-sm font-medium" x-text="m.name"></span>
                                        <span x-show="m.vip" class="bg-[#f3a73c] text-black text-[9px] px-1 rounded font-bold">VIP</span>
                                    </div>
                                    <span class="text-[10px] text-white/20" x-text="m.time"></span>
                                </div>
                                <div x-show="m.desc" class="text-[10px] text-white/40" x-text="m.desc"></div>
                                <div x-show="m.badge" class="mt-1"><span class="bg-orange-500/20 text-orange-400 text-[9px] px-1.5 py-0.5 rounded-full" x-text="m.badge"></span></div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- 图5: 高级设置弹窗 -->
                <div x-show="popover === 'advanced'" x-cloak class="absolute bottom-12 right-24 w-60 glass-panel rounded-xl p-4 z-50 shadow-2xl">
                    <div class="text-[10px] text-white/40 mb-3 tracking-wider uppercase">高级设置</div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm">联网搜索</span>
                        <div class="w-10 h-5 bg-white/10 rounded-full relative cursor-pointer flex items-center p-1">
                            <div class="w-3 h-3 bg-white/20 rounded-full"></div>
                        </div>
                    </div>
                </div>

                <!-- 图6: 数量选择弹窗 -->
                <div x-show="popover === 'count'" x-cloak class="absolute bottom-12 right-12 w-20 glass-panel rounded-lg overflow-hidden z-50 shadow-2xl">
                    <div class="flex flex-col">
                        <button class="py-2 text-xs hover:bg-white/10">1个</button>
                        <button class="py-2 text-xs hover:bg-white/10 border-t border-white/5">2个</button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- 状态切换控制器 (仅用于演示预览) -->
    <div class="fixed bottom-4 left-4 bg-black/80 border border-white/20 p-2 rounded-lg flex gap-2 z-[100]">
        <button @click="activeState = 1; popover = null" :class="activeState === 1 ? 'bg-white text-black' : 'text-white'" class="px-2 py-1 text-[10px] rounded">图1 (默认)</button>
        <button @click="activeState = 2; popover = null" :class="activeState === 2 ? 'bg-white text-black' : 'text-white'" class="px-2 py-1 text-[10px] rounded">图2 (未激活)</button>
        <button @click="activeState = 1; popover = 'setting'" :class="popover === 'setting' ? 'bg-white text-black' : 'text-white'" class="px-2 py-1 text-[10px] rounded">图3 (参数)</button>
        <button @click="activeState = 1; popover = 'model'" :class="popover === 'model' ? 'bg-white text-black' : 'text-white'" class="px-2 py-1 text-[10px] rounded">图4 (模型)</button>
        <button @click="activeState = 1; popover = 'advanced'" :class="popover === 'advanced' ? 'bg-white text-black' : 'text-white'" class="px-2 py-1 text-[10px] rounded">图5 (搜索)</button>
        <button @click="activeState = 1; popover = 'count'" :class="popover === 'count' ? 'bg-white text-black' : 'text-white'" class="px-2 py-1 text-[10px] rounded">图6 (数量)</button>
    </div>

</body>
</html>
