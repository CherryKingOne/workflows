<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片查看器复刻</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隐藏滚动条以完全贴合原图全屏效果 */
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
</head>
<body class="w-screen h-screen relative flex items-center justify-center select-none font-sans">

    <!-- 右上角关闭按钮 -->
    <button class="absolute top-5 right-6 z-20 text-[#888888] hover:text-[#ffffff] transition-colors duration-200 cursor-pointer p-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>

    <!-- 中心主图 -->
    <!-- 注意：此处使用了一张占位图。请将 src 替换为你原图中的实际图片地址 -->
    <img 
        src="https://images.unsplash.com/photo-1549471156-52c42d65d496?q=80&w=1200&auto=format&fit=crop" 
        alt="展示图片" 
        class="relative z-10 w-auto h-auto max-w-full max-h-[100vh] object-contain shadow-2xl"
    >

    <!-- 底部操作栏 -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex items-center bg-[#0f0f0f] border border-[#222222] rounded-full p-[3px] shadow-lg">
        
        <!-- 下载按钮 -->
        <button class="flex items-center justify-center gap-[6px] bg-[#00a2e8] hover:bg-[#0092d1] text-white px-5 py-[7px] rounded-full text-[13px] transition-colors duration-200 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            下载
        </button>
        
        <!-- 复制按钮 -->
        <button class="text-[#a3a3a3] hover:text-[#ffffff] px-5 py-[7px] rounded-full text-[13px] transition-colors duration-200 cursor-pointer bg-transparent">
            复制
        </button>
        
    </div>

</body>
</html>
