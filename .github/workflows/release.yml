name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (Intel)
        run: npm run tauri build -- --target x86_64-apple-darwin
        env:
          RUST_BACKTRACE: 1

      - name: Build Tauri app (Apple Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          RUST_BACKTRACE: 1

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: List build artifacts
        run: |
          echo "Listing build artifacts..."
          find src-tauri/target/release/bundle -type f || true

      - name: Rename DMG files
        run: |
          cd src-tauri/target/release/bundle/dmg
          if ls *_x64.dmg 1> /dev/null 2>&1; then
            for f in *_x64.dmg; do
              mv "$f" "WeiMeng_${{ steps.get_version.outputs.VERSION }}_x64.dmg"
            done
          fi
          if ls *_aarch64.dmg 1> /dev/null 2>&1; then
            for f in *_aarch64.dmg; do
              mv "$f" "WeiMeng_${{ steps.get_version.outputs.VERSION }}_aarch64.dmg"
            done
          fi
          ls -lh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build
        env:
          RUST_BACKTRACE: 1

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: List build artifacts
        shell: bash
        run: |
          echo "Listing build artifacts..."
          find src-tauri/target/release/bundle -type f || true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build
        env:
          RUST_BACKTRACE: 1

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: List build artifacts
        run: |
          echo "Listing build artifacts..."
          find src-tauri/target/release/bundle -type f || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux

      - name: List all artifacts
        run: |
          echo "All downloaded artifacts:"
          find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: WeiMeng v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## WeiMeng v${{ steps.get_version.outputs.VERSION }}

            ### Changes
            - See [CHANGELOG.md](./CHANGELOG.md) for details

            ### Downloads

            #### macOS
            - **Intel Mac**: `WeiMeng_${{ steps.get_version.outputs.VERSION }}_x64.dmg`
            - **Apple Silicon**: `WeiMeng_${{ steps.get_version.outputs.VERSION }}_aarch64.dmg`

            #### Windows
            - **Installer**: `WeiMeng_${{ steps.get_version.outputs.VERSION }}_x64-setup.exe`
            - **MSI**: `WeiMeng_${{ steps.get_version.outputs.VERSION }}_x64.msi`

            #### Linux
            - **AppImage**: `WeiMeng_${{ steps.get_version.outputs.VERSION }}_x64.AppImage`
            - **DEB**: `WeiMeng_${{ steps.get_version.outputs.VERSION }}_amd64.deb`

            ### System Requirements
            - **macOS**: 10.15 (Catalina) or later
            - **Windows**: Windows 10 or later
            - **Linux**: Ubuntu 18.04+ or equivalent

          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          files: |
            artifacts/macos/**/*.dmg
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.msi
            artifacts/linux/**/*.AppImage
            artifacts/linux/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
