<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传卡片 - 完整复刻交互版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 背景点状网格复刻 */
        .bg-dot-grid {
            background-color: #0b0c0e;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        /* 自定义深色卡片背景 */
        .bg-card-dark { background-color: #18191c; }
        .bg-btn-dark { background-color: #1e2023; }
        .bg-tool-dark { background-color: #2a2d32; }

        /* 连接线样式 */
        .connection-line {
            stroke: #a3a3a3; /* 灰白色 - 连接后状态 */
            stroke-width: 2;
            fill: none;
            transition: stroke 0.2s ease, stroke-width 0.2s ease;
        }
        .connection-line.dragging {
            stroke: #737373; /* 深灰色 - 拖拽中状态 */
            stroke-width: 2;
            stroke-dasharray: 6 4; /* 虚线效果表示拖拽中 */
            animation: dash-flow 0.5s linear infinite;
        }
        .connection-line:hover {
            stroke: #d4d4d4; /* 悬停时更亮 */
            stroke-width: 2.5;
            cursor: pointer;
        }
        @keyframes dash-flow {
            to {
                stroke-dashoffset: -10;
            }
        }

        /* 连接点激活状态 */
        .port-active {
            box-shadow: 0 0 8px rgba(163, 163, 163, 0.6);
        }
    </style>
</head>
<body class="bg-dot-grid text-neutral-300 min-h-screen p-8 md:p-16 font-sans antialiased overflow-x-hidden">

    <div class="max-w-7xl mx-auto space-y-24">
        
        <!-- ================= 第一部分：三种基础状态对比 ================= -->
        <section>
            <h2 class="text-white text-xl font-medium mb-10 border-l-4 border-neutral-700 pl-4">组件状态演进</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                
                <!-- 状态 1: 默认态 -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 01: Default</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">文件上传</div>
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center border border-transparent relative">
                            <!-- 左侧输入点 -->
                            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer hover:bg-neutral-400 transition-colors" title="输入"></div>
                            <!-- 右侧输出点 -->
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer hover:bg-neutral-400 transition-colors" title="输出"></div>
                            <button class="border border-neutral-700 bg-btn-dark hover:border-neutral-500 text-neutral-200 text-sm px-5 py-2 rounded-xl transition-all">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴<br>支持图片、视频、音频素材</div>
                        </div>
                    </div>
                </div>

                <!-- 状态 2: 交互态 (带弧形菜单) -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 02: Tool Interaction</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">文件上传</div>
                        <!-- 主体卡片 -->
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center relative border border-neutral-700">
                            <!-- 左侧输入点 -->
                            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer hover:bg-neutral-400 transition-colors" title="输入"></div>
                            <!-- 右侧输出点 -->
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer hover:bg-neutral-400 transition-colors" title="输出"></div>
                            <!-- 右上关闭 -->
                            <button class="absolute -top-2.5 -right-2.5 w-7 h-7 bg-tool-dark border border-neutral-700 rounded-full flex items-center justify-center text-neutral-400 hover:text-white"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                            
                            <button class="border border-neutral-700 bg-btn-dark text-neutral-200 text-sm px-5 py-2 rounded-xl">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴</div>
                        </div>
                    </div>
                </div>

                <!-- 状态 3: 激活/聚焦态 -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Status 03: Focused / Selected</p>
                    <div class="relative">
                        <div class="text-[12px] text-neutral-400 mb-2">文件上传</div>
                        <div class="w-full aspect-square max-w-[320px] bg-card-dark rounded-2xl flex flex-col items-center justify-center border-2 border-neutral-500 shadow-[0_0_20px_rgba(255,255,255,0.05)] relative">
                            <!-- 左侧输入点 -->
                            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-400 rounded-full border-2 border-white cursor-pointer hover:bg-white transition-colors" title="输入"></div>
                            <!-- 右侧输出点 -->
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-400 rounded-full border-2 border-white cursor-pointer hover:bg-white transition-colors" title="输出"></div>
                            <button class="border border-neutral-700 bg-btn-dark text-neutral-200 text-sm px-5 py-2 rounded-xl">选择文件</button>
                            <div class="mt-4 text-center text-[11px] text-neutral-500 leading-5">或拖放文件到此处<br>或 Ctrl+V 粘贴</div>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- ================= 第二部分：连接线样式演示 ================= -->
        <section>
            <h2 class="text-white text-xl font-medium mb-10 border-l-4 border-neutral-700 pl-4">连接线样式</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                
                <!-- 拖拽中状态 -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Dragging State</p>
                    <div class="bg-[#121316] rounded-2xl border border-neutral-800 p-8 min-h-[200px] flex flex-col items-center justify-center relative">
                        <div class="relative w-full max-w-[320px] h-12 z-10 flex items-center justify-between">
                            <svg class="absolute inset-0 w-full h-full pointer-events-none z-[-1]" style="overflow: visible;">
                                <path class="connection-line dragging" d="M 48,24 C 100,24 220,24 272,24" />
                            </svg>
                            <div class="w-12 h-12 bg-tool-dark rounded-xl border border-neutral-700 flex items-center justify-center relative z-10">
                                <i data-lucide="upload" class="w-5 h-5 text-neutral-400"></i>
                            </div>
                            <div class="text-[11px] text-neutral-500 px-4 py-2 bg-tool-dark/50 rounded-lg border border-neutral-800 relative z-10">拖拽中...</div>
                            <div class="w-12 h-12 bg-tool-dark rounded-xl border border-neutral-700 flex items-center justify-center border-dashed relative z-10">
                                <i data-lucide="download" class="w-5 h-5 text-neutral-500"></i>
                            </div>
                        </div>
                        <p class="text-[11px] text-neutral-600 mt-8 text-center">虚线动画 · 深灰色 (#737373)</p>
                    </div>
                </div>

                <!-- 连接后状态 -->
                <div class="space-y-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-tighter">Connected State</p>
                    <div class="bg-[#121316] rounded-2xl border border-neutral-800 p-8 min-h-[200px] flex flex-col items-center justify-center relative">
                        <div class="relative w-full max-w-[320px] h-12 z-10 flex items-center justify-between">
                            <svg class="absolute inset-0 w-full h-full pointer-events-none z-[-1]" style="overflow: visible;">
                                <path class="connection-line" d="M 48,24 C 100,24 220,24 272,24" />
                            </svg>
                            <div class="w-12 h-12 bg-tool-dark rounded-xl border border-neutral-500 flex items-center justify-center relative z-10">
                                <i data-lucide="upload" class="w-5 h-5 text-neutral-300"></i>
                            </div>
                            <div class="text-[11px] text-neutral-400 px-4 py-2 bg-tool-dark/50 rounded-lg border border-neutral-700 relative z-10">已连接</div>
                            <div class="w-12 h-12 bg-tool-dark rounded-xl border border-neutral-500 flex items-center justify-center relative z-10">
                                <i data-lucide="download" class="w-5 h-5 text-neutral-300"></i>
                            </div>
                        </div>
                        <p class="text-[11px] text-neutral-600 mt-8 text-center">实线 · 灰白色 (#a3a3a3)</p>
                    </div>
                </div>

            </div>

            <!-- 曲线连接示例 (核心修复部分) -->
            <div class="mt-12">
                <p class="text-xs text-neutral-500 uppercase tracking-tighter mb-4">Bezier Curve Example</p>
                <div class="bg-[#121316] rounded-2xl border border-neutral-800 p-8 min-h-[300px] relative">
                    <svg class="absolute inset-0 w-full h-full" style="overflow: visible;">
                        <!-- 连接线1: 平滑曲线 (精准吸附在 视频节点 与 胶片节点 之间) -->
                        <path class="connection-line" d="M 112,112 C 216,112 216,176 320,176" />
                        <!-- 连接线2: 另一条曲线 (精准吸附在 音频节点 与 音量节点 之间) -->
                        <path class="connection-line" d="M 112,256 C 216,256 216,288 320,288" />
                        <!-- 拖拽中的线 (从 胶片节点 引出，准确吸附在 闪烁虚线节点 上) -->
                        <path class="connection-line dragging" d="M 384,176 C 400,176 400,224 416,224" />
                    </svg>
                    
                    <!-- 节点组 -->
                    <div class="relative z-10">
                        <!-- 左侧节点 -->
                        <div class="absolute left-4 top-12 w-16 h-16 bg-card-dark rounded-xl border border-neutral-600 flex items-center justify-center">
                            <i data-lucide="file-video" class="w-6 h-6 text-neutral-400"></i>
                        </div>
                        <div class="absolute left-4 top-48 w-16 h-16 bg-card-dark rounded-xl border border-neutral-600 flex items-center justify-center">
                            <i data-lucide="file-audio" class="w-6 h-6 text-neutral-400"></i>
                        </div>
                        
                        <!-- 右侧节点 -->
                        <div class="absolute left-72 top-28 w-16 h-16 bg-card-dark rounded-xl border border-neutral-500 flex items-center justify-center">
                            <i data-lucide="film" class="w-6 h-6 text-neutral-300"></i>
                        </div>
                        <div class="absolute left-72 top-56 w-16 h-16 bg-card-dark rounded-xl border border-neutral-500 flex items-center justify-center">
                            <i data-lucide="volume-2" class="w-6 h-6 text-neutral-300"></i>
                        </div>
                        
                        <!-- 最右侧拖拽目标 -->
                        <div class="absolute left-96 top-40 w-16 h-16 bg-card-dark rounded-xl border border-neutral-700 border-dashed flex items-center justify-center">
                            <i data-lucide="sparkles" class="w-6 h-6 text-neutral-500"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 初始化图标
        lucide.createIcons();

        // 弹窗控制逻辑
        function toggleModal() {
            const modal = document.getElementById('modal-backdrop');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden'; // 防止背景滚动
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }
        }

        // 快捷键监听 (Ctrl+S)
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                toggleModal();
            }
        });
    </script>
</body>
</html>
