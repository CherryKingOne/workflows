<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI生成图片 - 原型状态图复刻 (最终版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 完美复刻暗色圆点网格背景 */
        body {
            background-color: #09090b;
            background-image: radial-gradient(circle, #3f3f46 1px, transparent 1px);
            background-size: 32px 32px;
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 自定义暗色卡片背景，稍微带点透明度的质感 */
        .card-bg {
            background-color: #18181b;
        }
        
        /* 输入框底色 */
        .input-bg {
            background-color: #121214;
        }

        /* 隐藏滚动条但保留功能 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="p-10 min-h-screen flex flex-col items-center gap-20 pb-60">

    <!-- 全局标题 -->
    <div class="w-[640px] flex items-center gap-2 mb-2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l3 7 7 1-5 5 1 7-7-4-7 4 1-7-5-5 7-1 3-7z"></path>
            <circle cx="12" cy="12" r="3" fill="#a855f7"></circle>
        </svg>
        <span class="text-gray-300 font-medium text-lg tracking-wider">生成图片</span>
    </div>

    <!-- 状态 1-4 保留作参考 -->
    <div class="w-[640px]">
        <div class="mb-4 flex items-center gap-2 text-sm text-gray-400 border-l-4 border-purple-500 pl-2">
            <strong>状态 1：</strong> 点击按钮后的默认弹窗样式（初始展开状态）
        </div>
        <div class="relative card-bg border border-white/10 rounded-2xl w-[600px] h-[480px] p-5 flex flex-col justify-between shadow-2xl ml-4">
            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer"></div>
            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer"></div>
            <div class="text-gray-400 text-xl tracking-wide pt-6 pl-4 font-light">输入提示词...</div>
            <div class="flex items-center gap-3 w-full">
                <div class="input-bg border border-white/10 rounded-lg px-4 py-2 flex-1 text-gray-200 text-sm flex items-center">Qwen Image Edit</div>
                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg px-4 py-2 text-gray-300 text-sm">1:1</button>
                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg px-4 py-2 text-gray-300 text-sm">1K</button>
                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg w-9 h-9 flex items-center justify-center"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"></path></svg></button>
                <button class="text-gray-500 hover:text-gray-300 transition w-6 flex justify-center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path></svg></button>
            </div>
        </div>
    </div>

    <!-- 状态 2 -->
    <div class="w-[640px]">
        <div class="mb-4 flex items-center gap-2 text-sm text-gray-400 border-l-4 border-blue-500 pl-2">
            <strong>状态 2：</strong> 点击后并且鼠标停留在卡片中显示的样式
        </div>
        <div class="relative card-bg border border-white/10 rounded-2xl w-[600px] h-[480px] p-5 flex flex-col justify-between shadow-2xl ml-4">
            <button class="absolute top-[-10px] right-[-10px] w-7 h-7 bg-[#27272a] border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-gray-700 transition z-10"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>
            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer"></div>
            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer"></div>
            <div class="text-gray-400 text-xl tracking-wide pt-6 pl-4 font-light">输入提示词...</div>
            <div class="flex items-center gap-3 w-full">
                <div class="input-bg border border-white/10 rounded-lg px-4 py-2 flex-1 text-gray-200 text-sm flex items-center">Qwen Image Edit</div>
                <button class="card-bg border border-white/10 rounded-lg px-4 py-2 text-gray-300 text-sm">1:1</button>
                <button class="card-bg border border-white/10 rounded-lg px-4 py-2 text-gray-300 text-sm">1K</button>
                <button class="card-bg border border-white/10 rounded-lg w-9 h-9 flex items-center justify-center"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"></path></svg></button>
                <button class="text-gray-500 w-6 flex justify-center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path></svg></button>
            </div>
        </div>
    </div>

    <!-- 状态 3 -->
    <div class="w-[640px]">
        <div class="mb-4 flex items-center gap-2 text-sm text-gray-400 border-l-4 border-gray-500 pl-2">
            <strong>状态 3：</strong> 收起状态的小条（非激活状态）
        </div>
        <div class="relative card-bg border border-white/10 rounded-2xl w-[600px] p-3 flex flex-col shadow-xl ml-4">
            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer"></div>
            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer"></div>
            <div class="flex items-center gap-3 w-full">
                <div class="input-bg border border-white/10 rounded-lg px-4 py-2 flex-1 text-gray-200 text-sm flex items-center">Qwen Image Edit</div>
                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg px-4 py-2 text-gray-300 text-sm">1:1</button>
                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg px-4 py-2 text-gray-300 text-sm">1K</button>
                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg w-9 h-9 flex items-center justify-center"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"></path></svg></button>
                <button class="text-gray-500 hover:text-gray-300 transition w-6 flex justify-center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path></svg></button>
            </div>
            <div class="w-full flex justify-center mt-2"><div class="w-10 h-1 bg-[#3f3f46] rounded-full"></div></div>
        </div>
    </div>

    <!-- 状态 4 -->
    <div class="w-[640px]">
        <div class="mb-4 flex items-center gap-2 text-sm text-gray-400 border-l-4 border-[#3b82f6] pl-2">
            <strong>状态 4：</strong> 收起状态下悬浮触发的输入框面板
        </div>
        <div class="relative w-[600px] ml-4 flex flex-col gap-2">
            <div class="absolute left-0 top-[32px] -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer z-20"></div>
            <div class="absolute right-0 top-[32px] translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer z-20"></div>
            <div class="relative card-bg border border-white/10 rounded-2xl w-full p-3 flex flex-col shadow-xl z-10">
                <div class="flex items-center gap-3 w-full">
                    <div class="input-bg border border-white/10 rounded-lg px-4 py-2 flex-1 text-gray-200 text-sm flex items-center">Qwen Image Edit</div>
                    <button class="card-bg border border-white/10 rounded-lg px-4 py-2 text-gray-300 text-sm">1:1</button>
                    <button class="card-bg border border-white/10 rounded-lg px-4 py-2 text-gray-300 text-sm">1K</button>
                    <button class="card-bg border border-white/10 rounded-lg w-9 h-9 flex items-center justify-center"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"></path></svg></button>
                    <button class="text-gray-500 w-6 flex justify-center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path></svg></button>
                </div>
                <div class="w-full flex justify-center mt-2"><div class="w-12 h-1 bg-blue-600 rounded-full shadow-[0_0_8px_rgba(37,99,235,0.6)]"></div></div>
            </div>
            <div class="relative card-bg border border-white/10 rounded-2xl w-full h-[180px] p-2 shadow-xl">
                <div class="w-full h-full border border-blue-900/50 bg-[#161619] rounded-xl p-4 flex items-start ring-1 ring-blue-500/20 shadow-[inset_0_0_20px_rgba(37,99,235,0.05)]">
                    <div class="flex items-center text-gray-400 text-xl tracking-wide font-light gap-[2px]">
                        <div class="w-[2px] h-[22px] bg-gray-500 animate-pulse"></div>输入提示词...
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- ==========================================
         最终选定状态: 带有统一【橙黄色】未配置提醒的下拉菜单
         ========================================== -->
    <div class="w-[640px]">
        <div class="mb-4 flex items-center gap-2 text-sm text-gray-400 border-l-4 border-amber-500 pl-2">
            <strong>最终状态：</strong> 采用橙黄色（Amber）发光标签的未配置 Key 提醒样式
        </div>
        
        <div class="relative card-bg border border-white/10 rounded-2xl w-[600px] h-[480px] p-5 flex flex-col justify-between shadow-2xl ml-4">
            <!-- 节点 -->
            <div class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer z-10" ></div>
            <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-3 h-3 bg-neutral-600 rounded-full border-2 border-neutral-400 cursor-pointer z-10" ></div>
            
            <div class="text-gray-400 text-xl tracking-wide pt-6 pl-4 font-light">
                输入提示词...
            </div>

            <!-- 底部工具栏 -->
            <div class="flex items-center gap-3 w-full relative">
                <div class="relative flex-1">
                    <button class="w-full input-bg border border-white/20 rounded-lg px-4 py-2 text-gray-200 text-sm flex items-center justify-between cursor-pointer transition">
                        <span>Qwen Image...</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><path d="M18 15l-6-6-6 6"/></svg>
                    </button>

                    <!-- 下拉菜单弹窗 -->
                    <div class="absolute top-[calc(100%+8px)] left-0 w-[310px] card-bg border border-white/10 rounded-xl p-1.5 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.8)] z-50 flex flex-col gap-1">
                        
                        <!-- 选中项 (正常可用) -->
                        <button class="w-full text-left p-2.5 rounded-lg bg-[#27272a] hover:bg-white/10 transition flex items-center justify-between">
                            <div>
                                <div class="text-white text-[15px] font-medium tracking-wide">Qwen Image Edit</div>
                                <div class="text-gray-400 text-[13px] mt-0.5">通义万相图像编辑模型</div>
                            </div>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </button>

                        <!-- 未选中项 (正常可用) -->
                        <button class="w-full text-left p-2.5 rounded-lg hover:bg-white/5 transition flex items-center justify-between group">
                            <div>
                                <div class="text-gray-300 group-hover:text-white text-[15px] font-medium tracking-wide transition-colors">FLUX.1 Dev</div>
                                <div class="text-[#71717a] group-hover:text-gray-400 text-[13px] mt-0.5 transition-colors">高质量图像生成模型</div>
                            </div>
                        </button>

                        <!-- ========================================== -->
                        <!-- 未配置项 1 (统一使用橙黄高亮样式)              -->
                        <!-- ========================================== -->
                        <button class="w-full text-left p-2.5 rounded-lg hover:bg-white/5 transition flex items-center justify-between group opacity-80 hover:opacity-100">
                            <div class="flex-1">
                                <div class="text-gray-300 group-hover:text-white text-[15px] font-medium tracking-wide transition-colors">SDXL</div>
                                <div class="text-[#71717a] group-hover:text-gray-400 text-[13px] mt-0.5 transition-colors">Stable Diffusion XL</div>
                            </div>
                            <!-- 橙黄发光标签 -->
                            <span class="ml-2 whitespace-nowrap text-[11px] px-2 py-0.5 rounded border border-amber-500/40 bg-amber-500/10 text-amber-400 tracking-wide font-medium shadow-[0_0_8px_rgba(251,191,36,0.15)] transition-shadow group-hover:shadow-[0_0_12px_rgba(251,191,36,0.25)]">
                                未配置 Key
                            </span>
                        </button>
                        
                        <!-- ========================================== -->
                        <!-- 未配置项 2 (统一使用橙黄高亮样式)              -->
                        <!-- ========================================== -->
                        <button class="w-full text-left p-2.5 rounded-lg hover:bg-white/5 transition flex items-center justify-between group opacity-80 hover:opacity-100">
                            <div class="flex-1">
                                <div class="text-gray-300 group-hover:text-white text-[15px] font-medium tracking-wide transition-colors">DALL·E 3</div>
                                <div class="text-[#71717a] group-hover:text-gray-400 text-[13px] mt-0.5 transition-colors">OpenAI 图像生成模型</div>
                            </div>
                            <!-- 橙黄发光标签 -->
                            <span class="ml-2 whitespace-nowrap text-[11px] px-2 py-0.5 rounded border border-amber-500/40 bg-amber-500/10 text-amber-400 tracking-wide font-medium shadow-[0_0_8px_rgba(251,191,36,0.15)] transition-shadow group-hover:shadow-[0_0_12px_rgba(251,191,36,0.25)]">
                                未配置 Key
                            </span>
                        </button>

                    </div>
                </div>

                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg px-4 py-2 text-gray-300 text-sm">1:1</button>
                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg px-4 py-2 text-gray-300 text-sm">1K</button>
                <button class="card-bg border border-white/10 hover:bg-white/5 transition rounded-lg w-9 h-9 flex items-center justify-center">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"></path></svg>
                </button>
                <button class="text-gray-500 hover:text-gray-300 transition w-6 flex justify-center">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path></svg>
                </button>
            </div>
        </div>
    </div>

</body>
</html>
