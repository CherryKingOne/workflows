<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型接口配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义外层背景点阵 */
        .bg-dots {
            background-color: #050505;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        /* 自定义滚动条样式还原 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* 移除密码输入框默认的眼睛图标 (Edge/IE) */
        input::-ms-reveal,
        input::-ms-clear {
            display: none;
        }
    </style>
</head>
<body class="bg-dots min-h-screen flex items-center justify-center p-6 font-sans antialiased text-zinc-300">

    <!-- 弹窗主容器 -->
    <div class="w-full max-w-[800px] h-[85vh] max-h-[850px] bg-[#121212] border border-zinc-800 rounded-xl shadow-2xl flex flex-col overflow-hidden">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-[18px]">
            <h2 class="text-[16px] font-medium text-zinc-100 tracking-wide">模型接口配置</h2>
            <button class="text-zinc-500 hover:text-zinc-300 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- 导航 Tabs -->
        <div class="flex px-6 border-b border-zinc-800/80 text-[14px] select-none">
            <!-- Active Tab: Chat -->
            <button class="flex items-center gap-2 px-3 py-3 text-blue-400 border-b-2 border-blue-500 relative top-[1px]">
                <span>Chat</span>
                <span class="bg-[#1e293b] text-blue-300 px-1.5 py-0.5 rounded text-[12px] font-medium">20</span>
            </button>
            <button class="flex items-center gap-2 px-4 py-3 text-zinc-400 hover:text-zinc-200">
                <span>Image</span>
                <span class="bg-[#222] px-1.5 py-0.5 rounded text-[12px] font-medium">14</span>
            </button>
            <button class="flex items-center gap-2 px-4 py-3 text-zinc-400 hover:text-zinc-200">
                <span>Video</span>
                <span class="bg-[#222] text-zinc-400 px-1.5 py-0.5 rounded text-[12px] font-medium">29</span>
            </button>
        </div>

        <!-- 内部可滚动内容区 -->
        <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4">
            <!-- 模型列表区域 -->
            <div class="flex flex-col gap-4">
                
                <!-- 卡片 1: gpt-5.4 -->
                <div class="bg-[#161618] border border-zinc-800/80 rounded-xl p-5 flex flex-col gap-5">
                    <!-- 卡片 Header -->
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2.5">
                            <div class="w-2 h-2 rounded-full bg-zinc-500"></div>
                            <span class="text-zinc-200 font-medium text-[15px]">gpt-5.4</span>
                        </div>
                        <span class="bg-blue-500/20 text-blue-400 text-[12px] px-2.5 py-0.5 rounded-md font-medium">Chat</span>
                    </div>

                    <!-- 表单 Grid 布局 -->
                    <div class="grid grid-cols-[80px_1fr] items-center gap-y-3.5">
                        
                        <label class="text-[12px] text-zinc-500 text-right pr-4">MODEL ID</label>
                        <input type="text" value="gpt-5.4" class="w-full bg-[#1e1e20] border border-zinc-700/40 rounded-lg px-3 py-2 text-[14px] text-zinc-300 outline-none focus:border-zinc-500 transition-colors">

                        <label class="text-[12px] text-zinc-500 text-right pr-4">API KEY</label>
                        <div class="relative w-full">
                            <input type="text" placeholder="sk-..." class="w-full bg-[#1e1e20] border border-zinc-700/40 rounded-lg pl-3 pr-10 py-2 text-[14px] text-zinc-500 placeholder-zinc-600 outline-none focus:border-zinc-500 transition-colors">
                            <button class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>

                        <label class="text-[12px] text-zinc-500 text-right pr-4">BASE URL</label>
                        <input type="text" value="https://ai.comfly.chat" class="w-full bg-[#1e1e20] border border-zinc-700/40 rounded-lg px-3 py-2 text-[14px] text-zinc-300 outline-none focus:border-zinc-500 transition-colors">
                    </div>

                    <!-- 测试连接 -->
                    <div class="flex justify-end pt-1">
                        <button class="flex items-center gap-1.5 text-[13px] text-zinc-400 hover:text-zinc-200 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                            </svg>
                            <span>测试连接</span>
                        </button>
                    </div>
                </div>

                <!-- 卡片 2: gpt-5.4-pro -->
                <div class="bg-[#161618] border border-zinc-800/80 rounded-xl p-5 flex flex-col gap-5">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2.5">
                            <div class="w-2 h-2 rounded-full bg-zinc-500"></div>
                            <span class="text-zinc-200 font-medium text-[15px]">gpt-5.4-pro</span>
                        </div>
                        <span class="bg-blue-500/20 text-blue-400 text-[12px] px-2.5 py-0.5 rounded-md font-medium">Chat</span>
                    </div>

                    <div class="grid grid-cols-[80px_1fr] items-center gap-y-3.5">
                        <label class="text-[12px] text-zinc-500 text-right pr-4">MODEL ID</label>
                        <input type="text" value="gpt-5.4-pro" class="w-full bg-[#1e1e20] border border-zinc-700/40 rounded-lg px-3 py-2 text-[14px] text-zinc-300 outline-none focus:border-zinc-500 transition-colors">

                        <label class="text-[12px] text-zinc-500 text-right pr-4">API KEY</label>
                        <div class="relative w-full">
                            <input type="text" placeholder="sk-..." class="w-full bg-[#1e1e20] border border-zinc-700/40 rounded-lg pl-3 pr-10 py-2 text-[14px] text-zinc-500 placeholder-zinc-600 outline-none focus:border-zinc-500 transition-colors">
                            <button class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>

                        <label class="text-[12px] text-zinc-500 text-right pr-4">BASE URL</label>
                        <input type="text" value="https://ai.comfly.chat" class="w-full bg-[#1e1e20] border border-zinc-700/40 rounded-lg px-3 py-2 text-[14px] text-zinc-300 outline-none focus:border-zinc-500 transition-colors">
                    </div>

                    <div class="flex justify-end pt-1">
                        <button class="flex items-center gap-1.5 text-[13px] text-zinc-400 hover:text-zinc-200 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                            </svg>
                            <span>测试连接</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部 Footer -->
        <div class="px-6 py-4 border-t border-zinc-800/80 bg-[#121212] flex justify-end shrink-0 relative z-10 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)]">
            <button class="bg-[#2a2a2b] hover:bg-[#3f3f41] text-zinc-200 px-6 py-2 rounded-md text-[14px] font-medium transition-colors border border-zinc-700/50">
                关闭
            </button>
        </div>

    </div>

</body>
</html>
